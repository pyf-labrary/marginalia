<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 20个单机游戏设计灵感 — 互动PPT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e0e0e0;overflow:hidden;height:100vh}
.slide{display:none;height:100vh;overflow-y:auto;padding:40px 60px 80px;animation:fadeIn .4s ease}
.slide.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slide-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.slide-number{font-size:14px;color:#888;font-weight:600;letter-spacing:2px}
.category-tag{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600}
.cat-narrative{background:#1a1a3e;color:#7c8cf8}
.cat-mechanic{background:#1a3e1a;color:#7cf87c}
.cat-atmosphere{background:#3e1a3e;color:#f87cf8}
.cat-horror{background:#3e1a1a;color:#f87c7c}
.cat-strategy{background:#3e3e1a;color:#f8f87c}
.cat-hybrid{background:#1a3e3e;color:#7cf8f8}
.slide-title{font-size:42px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.slide-subtitle{font-size:16px;color:#888;margin:4px 0 20px;font-style:italic}
.concept-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border-left:4px solid #667eea;padding:16px 20px;border-radius:0 8px 8px 0;margin-bottom:20px}
.concept-box h3{color:#667eea;margin-bottom:8px;font-size:16px}
.concept-box p{line-height:1.7;font-size:15px}
.media-section{margin-bottom:20px}
.media-section h3{color:#aaa;margin-bottom:12px;font-size:15px}
.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.media-card{background:#111;border-radius:8px;overflow:hidden;border:1px solid #222}
.media-card iframe{width:100%;aspect-ratio:16/9;display:block}
.media-card img{width:100%;height:auto;display:block}
.media-caption{padding:8px 12px;font-size:12px;color:#999;line-height:1.5}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.col h3{font-size:15px;margin-bottom:10px;color:#ccc}
.col ul{list-style:none;padding:0}
.col li{padding:6px 0;font-size:14px;line-height:1.6;border-bottom:1px solid #1a1a2e}
.col li strong{color:#b0b0ff}
.detail-box{background:#0d1117;border:1px solid #1a1a2e;border-radius:8px;padding:16px 20px;margin-bottom:20px}
.detail-box h3{color:#f0c040;margin-bottom:8px;font-size:15px}
.detail-box p{font-size:14px;line-height:1.7;margin-bottom:8px;color:#ccc}
.ref-links{margin-bottom:20px}
.ref-links h3{font-size:14px;color:#aaa;margin-bottom:8px}
.ref-links ul{list-style:none;padding:0}
.ref-links li{padding:4px 0}
.ref-links a{color:#667eea;text-decoration:none;font-size:13px}
.ref-links a:hover{text-decoration:underline;color:#8899ff}
.source-box{background:#111;border-radius:6px;padding:10px 14px;font-size:12px;color:#666;margin-top:12px}
/* Navigation */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-top:1px solid #222;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.nav-center{display:flex;align-items:center;gap:8px}
.nav-btn{background:#1a1a2e;color:#ccc;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;transition:all .2s}
.nav-btn:hover{background:#667eea;color:#fff}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-dots{display:flex;gap:4px;align-items:center}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#333;cursor:pointer;transition:all .2s}
.nav-dot.active{background:#667eea;transform:scale(1.3)}
.nav-dot:hover{background:#555}
.progress-text{font-size:13px;color:#888;min-width:80px}
.progress-text.right{text-align:right}
/* TOC overlay */
.toc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;overflow-y:auto;padding:40px}
.toc-overlay.active{display:block}
.toc-title{font-size:28px;font-weight:700;color:#fff;text-align:center;margin-bottom:30px}
.toc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:1000px;margin:0 auto}
.toc-item{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:14px;cursor:pointer;transition:all .2s}
.toc-item:hover{border-color:#667eea;transform:translateY(-2px)}
.toc-item .toc-num{font-size:12px;color:#667eea;font-weight:700}
.toc-item .toc-name{font-size:14px;color:#eee;margin-top:4px}
.toc-item .toc-cat{font-size:11px;color:#888;margin-top:4px}
.toc-close{position:fixed;top:20px;right:30px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:201}
/* Keyboard hint */
.key-hint{position:fixed;top:10px;right:20px;font-size:11px;color:#444;z-index:50}
</style>
</head>
<body>
<div class="key-hint">← → 翻页 | M 目录 | F 全屏</div>
<div id="slides-container"></div>
<nav class="nav-bar">
  <span class="progress-text" id="progress-left"></span>
  <div class="nav-center">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)">◀ 上一页</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="nav-btn" id="btn-next" onclick="go(1)">下一页 ▶</button>
  </div>
  <span class="progress-text right" id="progress-right"></span>
</nav>
<div class="toc-overlay" id="toc">
  <button class="toc-close" onclick="toggleTOC()">✕</button>
  <div class="toc-title">📋 目录 — 20个游戏灵感</div>
  <div class="toc-grid" id="toc-grid"></div>
</div>
<script>
const slideFiles=[
'slides/slide-01.html','slides/slide-02.html','slides/slide-03.html','slides/slide-04.html','slides/slide-05.html',
'slides/slide-06.html','slides/slide-07.html','slides/slide-08.html','slides/slide-09.html','slides/slide-10.html',
'slides/slide-11.html','slides/slide-12.html','slides/slide-13.html','slides/slide-14.html','slides/slide-15.html',
'slides/slide-16.html','slides/slide-17.html','slides/slide-18.html','slides/slide-19.html','slides/slide-20.html'
];
const tocData=[
{n:'时间旅行侦探',c:'📖 叙事'},{n:'你是NPC',c:'📖 叙事'},{n:'不可靠叙事者',c:'📖 叙事'},{n:'AI自适应叙事',c:'📖 叙事'},{n:'反向银河城',c:'⚙️ 机制'},
{n:'蝙蝠回声定位',c:'⚙️ 机制'},{n:'影子木偶平台跳跃',c:'⚙️ 机制'},{n:'只有最终Boss',c:'⚙️ 机制'},{n:'情绪探索者',c:'🎨 氛围'},{n:'正念冒险',c:'🎨 氛围'},
{n:'分身检测员',c:'👻 恐怖'},{n:'智能家居杀手',c:'👻 恐怖'},{n:'跳吓模拟器',c:'👻 恐怖'},{n:'鲁布戈德堡捕怪器',c:'🧩 策略'},{n:'微型生态系统模拟',c:'🧩 策略'},
{n:'末日后幸存者',c:'🧩 策略'},{n:'解谜Roguelike',c:'🔀 混合'},{n:'自学习敌人潜行',c:'🔀 混合'},{n:'塔罗牌构建命运',c:'🔀 混合'},{n:'心率驱动冒险',c:'🔀 混合'}
];
let cur=0,total=slideFiles.length;
const container=document.getElementById('slides-container');
const dotsEl=document.getElementById('nav-dots');
const tocGrid=document.getElementById('toc-grid');

async function init(){
  for(let i=0;i<slideFiles.length;i++){
    try{
      const r=await fetch(slideFiles[i]);
      const html=await r.text();
      container.insertAdjacentHTML('beforeend',html);
    }catch(e){container.insertAdjacentHTML('beforeend','<section class="slide"><h1>Slide '+(i+1)+' 加载失败</h1></section>')}
    const dot=document.createElement('div');
    dot.className='nav-dot';
    dot.onclick=(()=>{const idx=i;return()=>goTo(idx)})();
    dotsEl.appendChild(dot);
    const item=document.createElement('div');
    item.className='toc-item';
    item.innerHTML='<div class="toc-num">'+(i+1).toString().padStart(2,'0')+' / 20</div><div class="toc-name">'+tocData[i].n+'</div><div class="toc-cat">'+tocData[i].c+'</div>';
    item.onclick=(()=>{const idx=i;return()=>{goTo(idx);toggleTOC()}})();
    tocGrid.appendChild(item);
  }
  goTo(0);
}
function goTo(i){
  const slides=container.querySelectorAll('.slide');
  slides.forEach(s=>s.classList.remove('active'));
  if(slides[i])slides[i].classList.add('active');
  cur=i;
  dotsEl.querySelectorAll('.nav-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  document.getElementById('btn-prev').disabled=i===0;
  document.getElementById('btn-next').disabled=i===total-1;
  document.getElementById('progress-left').textContent=tocData[i].c;
  document.getElementById('progress-right').textContent=(i+1)+' / '+total;
}
function go(d){const n=cur+d;if(n>=0&&n<total)goTo(n)}
function toggleTOC(){document.getElementById('toc').classList.toggle('active')}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  else if(e.key==='ArrowLeft')go(-1);
  else if(e.key==='m'||e.key==='M')toggleTOC();
  else if(e.key==='Escape')document.getElementById('toc').classList.remove('active');
  else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
});
init();
</script>
</body>
</html>
