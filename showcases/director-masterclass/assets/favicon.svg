<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0a0805"/>
  <!-- 6-blade camera iris -->
  <g transform="translate(32 32)" fill="none" stroke="#c69a4b" stroke-width="2" stroke-linejoin="round">
    <polygon points="0,-24 20.78,-12 20.78,12 0,24 -20.78,12 -20.78,-12" fill="#141009"/>
    <!-- blades -->
    <path d="M 0,-24 L 10,-10 L -10,-10 Z" fill="#c69a4b" opacity="0.85"/>
    <path d="M 20.78,-12 L 8,-4 L 18,8 Z" fill="#c69a4b" opacity="0.7"/>
    <path d="M 20.78,12 L 18,-8 L 4,8 Z" fill="#c69a4b" opacity="0.85"/>
    <path d="M 0,24 L -10,10 L 10,10 Z" fill="#c69a4b" opacity="0.7"/>
    <path d="M -20.78,12 L -8,4 L -18,-8 Z" fill="#c69a4b" opacity="0.85"/>
    <path d="M -20.78,-12 L -18,8 L -4,-8 Z" fill="#c69a4b" opacity="0.7"/>
  </g>
  <!-- center red dot -->
  <circle cx="32" cy="32" r="3.5" fill="#b8231c"/>
</svg>
