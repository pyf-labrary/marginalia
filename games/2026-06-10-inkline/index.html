<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨線 INKLINE — 线稿竞速</title>
<style>
  :root {
    --paper: #f2ecdf;
    --paper-deep: #e8e0cd;
    --ink: #21201c;
    --ink-soft: #4a4640;
    --vermilion: #c84b31;
    --teal: #2f6f6b;
    --ochre: #c9933a;
    --indigo: #3d4a78;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--paper); }
  body {
    font-family: "Songti SC", "Noto Serif SC", "Source Han Serif SC", STSong, SimSun, serif;
    color: var(--ink);
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ── paper grain over everything ───────────────────────── */
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 40;
    background-image: url("paper.jpg");
    background-size: 900px;
    mix-blend-mode: multiply;
    opacity: .5;
  }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 41;
    background: radial-gradient(ellipse at 50% 45%, transparent 58%, rgba(56,48,36,.22) 100%);
  }

  /* ── watercolor splash on bloom (multiply hides white) ─── */
  #splash {
    position: fixed; inset: -10%; pointer-events: none; z-index: 42;
    background-image: url("splash.jpg");
    background-size: cover; background-position: center;
    mix-blend-mode: multiply;
    opacity: 0; transform: scale(1.25);
    transition: none;
  }
  #splash.bloom {
    animation: splashBloom 2.8s cubic-bezier(.16,.84,.34,1) forwards;
  }
  @keyframes splashBloom {
    0%   { opacity: 0;   transform: scale(1.45) rotate(2deg); }
    18%  { opacity: .85; }
    100% { opacity: 0;   transform: scale(1.0) rotate(0deg); }
  }

  /* ── ink hit flash ─────────────────────────────────────── */
  #hitflash {
    position: fixed; inset: 0; pointer-events: none; z-index: 43;
    background: radial-gradient(ellipse at 50% 60%, rgba(33,32,28,.55), rgba(33,32,28,.15) 55%, transparent 75%);
    opacity: 0;
  }
  #hitflash.hit { animation: hitf .45s ease-out; }
  @keyframes hitf { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* ── HUD ───────────────────────────────────────────────── */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity .8s ease;
  }
  #hud.on { opacity: 1; }
  .hud-corner { position: absolute; line-height: 1.25; }
  #hud-chapter {
    top: 22px; left: 26px;
    writing-mode: vertical-rl; letter-spacing: .35em;
    font-size: 17px; color: var(--ink-soft);
  }
  #hud-chapter b { color: var(--ink); font-size: 21px; font-weight: 700; }
  #hud-dist {
    top: 20px; right: 26px; text-align: right;
    font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  #hud-dist small { display: block; font-size: 12px; letter-spacing: .4em; color: var(--ink-soft); font-weight: 400; }
  #hud-hp { position: absolute; top: 64px; right: 28px; display: flex; gap: 7px; justify-content: flex-end; }
  .hp-drop {
    width: 13px; height: 17px; background: var(--ink);
    border-radius: 50% 50% 50% 50% / 38% 38% 62% 62%;
    transform: rotate(0deg); transition: opacity .3s, transform .3s;
  }
  .hp-drop.lost { opacity: .14; transform: scale(.7); }

  /* color meter: a brush stroke that fills */
  #meter-wrap {
    position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
    width: min(320px, 56vw); text-align: center;
  }
  #meter-label { font-size: 11px; letter-spacing: .55em; color: var(--ink-soft); margin-bottom: 6px; }
  #meter {
    height: 10px; border: 1.5px solid var(--ink); border-radius: 6px / 14px;
    transform: rotate(-.4deg); overflow: hidden; background: rgba(255,255,255,.25);
  }
  #meter-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--teal), var(--ochre), var(--vermilion));
    transition: width .35s cubic-bezier(.3,1.2,.4,1);
  }
  #combo {
    position: absolute; left: 50%; top: 30%; transform: translateX(-50%);
    font-size: 50px; font-weight: 700; color: var(--vermilion);
    opacity: 0; pointer-events: none;
    text-shadow: 0 1px 0 rgba(255,255,255,.4);
  }
  #combo.pop { animation: comboPop .8s cubic-bezier(.2,1.6,.4,1); }
  @keyframes comboPop {
    0% { opacity: 0; transform: translateX(-50%) scale(.4) rotate(-6deg); }
    25% { opacity: 1; transform: translateX(-50%) scale(1.15) rotate(2deg); }
    60% { opacity: 1; transform: translateX(-50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translateX(-50%) scale(.96) translateY(-18px); }
  }
  #phase-toast {
    position: absolute; left: 50%; top: 18%; transform: translateX(-50%);
    font-size: 15px; letter-spacing: .8em; padding-left: .8em; color: var(--ink-soft);
    opacity: 0;
  }
  #phase-toast b { display: block; font-size: 34px; letter-spacing: .45em; padding-left: .45em; color: var(--ink); margin-top: 6px; font-weight: 700; }
  #phase-toast.show { animation: toast 3.2s ease forwards; }
  @keyframes toast {
    0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
    12% { opacity: 1; transform: translateX(-50%) translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  /* ── overlays (title / gameover) ───────────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 60;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.5), transparent 60%),
      var(--paper);
    transition: opacity .9s ease, visibility .9s;
  }
  .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .overlay::before {
    content: ""; position: absolute; inset: 14px;
    border: 1.5px solid var(--ink); border-radius: 3px;
    opacity: .55; pointer-events: none;
  }
  .overlay::after {
    content: ""; position: absolute; inset: 19px;
    border: 1px solid var(--ink); border-radius: 2px;
    opacity: .25; pointer-events: none;
  }

  #title-art { width: min(620px, 86vw); margin-bottom: -8px; }
  #title-art path, #title-art line, #title-art circle, #title-art ellipse {
    fill: none; stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round;
  }
  .draw { stroke-dasharray: var(--len, 600); stroke-dashoffset: var(--len, 600);
          animation: drawOn 2.4s cubic-bezier(.6,0,.3,1) forwards; }
  @keyframes drawOn { to { stroke-dashoffset: 0; } }

  h1 {
    font-size: clamp(54px, 11vw, 96px); font-weight: 700;
    letter-spacing: .18em; text-indent: .18em;
    margin: 4px 0 2px;
  }
  h1 .accent { color: var(--vermilion); }
  .subtitle {
    font-size: 14px; letter-spacing: .9em; padding-left: .9em;
    color: var(--ink-soft); margin-bottom: 34px;
  }
  .seal {
    position: absolute; right: 8%; top: 12%;
    width: 54px; height: 54px; border: 2.5px solid var(--vermilion); border-radius: 6px;
    color: var(--vermilion); font-size: 19px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    writing-mode: vertical-rl; letter-spacing: .1em;
    transform: rotate(4deg); opacity: .9;
  }
  .howto {
    display: flex; gap: 34px; margin-bottom: 26px; font-size: 13.5px; color: var(--ink-soft);
    letter-spacing: .12em;
  }
  /* chapter select: seal-like stamps */
  .chapsel { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
  .chapsel-label { font-size: 12px; letter-spacing: .5em; color: var(--ink-soft); }
  .chap {
    font-family: inherit; font-size: 17px; font-weight: 700;
    width: 40px; height: 40px; cursor: pointer;
    color: var(--ink); background: rgba(255,255,255,.3);
    border: 1.8px solid var(--ink); border-radius: 7px;
    transform: rotate(-2deg);
    transition: transform .15s cubic-bezier(.3,1.5,.5,1), background .15s, color .15s, border-color .15s;
  }
  .chap:nth-child(odd) { transform: rotate(2deg); }
  .chap:hover { transform: rotate(0) scale(1.12); }
  .chap.sel { background: var(--vermilion); border-color: var(--vermilion); color: var(--paper); }
  .chap.locked { opacity: .25; cursor: default; pointer-events: none; }
  .howto b { color: var(--ink); font-weight: 700; }
  .btn {
    font-family: inherit; font-size: 21px; letter-spacing: .55em; text-indent: .55em;
    padding: 13px 46px 15px; cursor: pointer;
    color: var(--paper); background: var(--ink);
    border: none; border-radius: 4px / 50%;
    transform: rotate(-.6deg);
    transition: transform .18s cubic-bezier(.3,1.5,.5,1), background .18s;
  }
  .btn:hover { transform: rotate(.4deg) scale(1.05); background: var(--vermilion); }
  .footnote { position: absolute; bottom: 34px; font-size: 11.5px; letter-spacing: .3em; color: var(--ink-soft); opacity: .75; }

  /* game over / pause */
  #over { z-index: 61; }
  #pause { z-index: 62; background: rgba(242,236,223,.88); backdrop-filter: blur(3px); }
  #over h2, #pause h2 { font-size: clamp(34px,7vw,54px); letter-spacing: .3em; text-indent: .3em; margin-bottom: 26px; }
  .btn-row { display: flex; gap: 18px; }
  .btn.ghost { background: transparent; color: var(--ink); border: 1.8px solid var(--ink); }
  .btn.ghost:hover { background: var(--vermilion); border-color: var(--vermilion); color: var(--paper); }
  .score-card { display: flex; gap: clamp(26px, 6vw, 64px); margin-bottom: 38px; text-align: center; }
  .score-card .v { font-size: clamp(30px, 6vw, 46px); font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-card .k { font-size: 12px; letter-spacing: .45em; padding-left: .45em; color: var(--ink-soft); margin-top: 6px; }
  .score-card .sep { width: 1px; background: var(--ink); opacity: .3; }

  #mute {
    position: fixed; z-index: 55; right: 22px; bottom: 20px;
    font-family: inherit; font-size: 13px; letter-spacing: .2em;
    background: none; border: 1.5px solid var(--ink-soft); border-radius: 4px;
    color: var(--ink-soft); padding: 5px 12px; cursor: pointer; opacity: .7;
  }
  #mute:hover { opacity: 1; }
  @media (max-width: 640px) {
    .howto { gap: 16px; flex-wrap: wrap; justify-content: center; }
    #hud-chapter { font-size: 14px; }
    #hud-dist { font-size: 24px; }
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="grain"></div>
  <div id="vignette"></div>
  <div id="splash"></div>
  <div id="hitflash"></div>

  <div id="hud">
    <div id="hud-chapter" class="hud-corner"><b id="ch-num">第一章</b><span id="ch-phase">素描</span></div>
    <div id="hud-dist" class="hud-corner"><span id="dist">0</span><small>行程 · 米</small></div>
    <div id="hud-hp"><div class="hp-drop"></div><div class="hp-drop"></div><div class="hp-drop"></div></div>
    <div id="meter-wrap">
      <div id="meter-label">墨 色 将 染</div>
      <div id="meter"><div id="meter-fill"></div></div>
    </div>
    <div id="combo"></div>
    <div id="phase-toast"><span id="toast-sub"></span><b id="toast-main"></b></div>
  </div>

  <div id="title" class="overlay">
    <div class="seal">墨線</div>
    <svg id="title-art" viewBox="0 0 620 150" aria-hidden="true">
      <!-- horizon stroke -->
      <path class="draw" style="--len:620; animation-delay:.1s" stroke-width="1.2" opacity=".5"
        d="M8 122 C 120 116, 250 126, 360 120 S 560 114, 612 121"/>
      <!-- distant hills -->
      <path class="draw" style="--len:300; animation-delay:.5s" stroke-width="1.4" opacity=".6"
        d="M40 121 C 70 92, 95 80, 118 79 C 142 80, 165 96, 188 120"/>
      <path class="draw" style="--len:260; animation-delay:.7s" stroke-width="1.2" opacity=".4"
        d="M460 120 C 488 98, 510 90, 528 90 C 548 91, 568 104, 586 120"/>
      <!-- road sweeping to viewer -->
      <path class="draw" style="--len:520; animation-delay:.9s" stroke-width="2"
        d="M300 121 C 280 124, 240 130, 196 150 M 320 121 C 350 126, 400 133, 452 150"/>
      <path class="draw" style="--len:120; animation-delay:1.3s" stroke-width="1.6" opacity=".7"
        d="M310 124 L 312 131 M 316 137 L 319 144"/>
      <!-- the car: low wedge, ink sketch -->
      <g transform="translate(258,86)">
        <path class="draw" style="--len:340; animation-delay:1.5s" stroke-width="2.4"
          d="M2 24 C 2 16, 8 12, 22 10 L 38 2 C 46 -1, 72 -1, 82 3 L 96 10 C 106 12, 110 16, 110 22 C 110 27, 106 29, 100 29 L 14 29 C 6 29, 2 28, 2 24 Z"/>
        <path class="draw" style="--len:90; animation-delay:1.9s" stroke-width="1.8"
          d="M40 4 L 50 11 L 78 11 L 86 5"/>
        <circle class="draw" style="--len:70; animation-delay:2.1s" stroke-width="2.2" cx="28" cy="29" r="9"/>
        <circle class="draw" style="--len:70; animation-delay:2.2s" stroke-width="2.2" cx="86" cy="29" r="9"/>
        <!-- motion strokes -->
        <path class="draw" style="--len:80; animation-delay:2.4s" stroke-width="1.6" opacity=".55"
          d="M-30 12 L -6 12 M -38 20 L -10 20 M -26 27 L -8 27"/>
      </g>
    </svg>
    <h1>墨<span class="accent">線</span></h1>
    <div class="subtitle">INKLINE — 一笔画出的竞速</div>
    <div class="howto">
      <span><b>← →</b>&ensp;或拖动 转向</span>
      <span><b>W / ↑</b>&ensp;蘸墨加速</span>
      <span><b>Esc</b>&ensp;暂笔</span>
      <span>集墨滴 · 穿门 · 待色染山河</span>
    </div>
    <div class="chapsel" id="chapsel">
      <span class="chapsel-label">起 章</span>
      <button class="chap" data-ch="0">一</button>
      <button class="chap" data-ch="1">二</button>
      <button class="chap" data-ch="2">三</button>
    </div>
    <button class="btn" id="start">起 笔</button>
    <div class="footnote">素描 → 晕染 → 剪纸 · 三境轮转</div>
  </div>

  <div id="over" class="overlay hidden">
    <div class="seal">终章</div>
    <h2>笔 尽 于 此</h2>
    <div class="score-card">
      <div><div class="v" id="ov-dist">0</div><div class="k">行程·米</div></div>
      <div class="sep"></div>
      <div><div class="v" id="ov-combo">0</div><div class="k">最高连击</div></div>
      <div class="sep"></div>
      <div><div class="v" id="ov-drops">0</div><div class="k">收集墨滴</div></div>
      <div class="sep"></div>
      <div><div class="v" id="ov-ch">一</div><div class="k">行至章节</div></div>
    </div>
    <button class="btn" id="restart">重 新 起 笔</button>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="seal">小憩</div>
    <h2>暂 笔</h2>
    <div class="btn-row">
      <button class="btn" id="resume">继 续</button>
      <button class="btn ghost" id="pause-restart">重 新 起 笔</button>
    </div>
  </div>

  <button id="mute" title="静音">音 · 开</button>

  <script type="module" src="js/main.js"></script>
</body>
</html>
