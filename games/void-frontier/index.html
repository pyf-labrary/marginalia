<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Frontier - Space Exploration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0ff;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
        }
        #uiLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #uiLayer > * { pointer-events: auto; }
        #loadingScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s;
        }
        #loadingScreen h1 {
            font-size: 48px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #08f;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        #loadingScreen .subtitle {
            font-size: 16px;
            color: #088;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }
        #loadingBar {
            width: 300px;
            height: 4px;
            background: #111;
            border: 1px solid #0ff;
            border-radius: 2px;
            overflow: hidden;
        }
        #loadingFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0ff, #08f);
            transition: width 0.3s;
        }
        #loadingText {
            margin-top: 15px;
            font-size: 12px;
            color: #066;
        }
        /* Main menu overlay */
        #mainMenu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        #mainMenu h1 {
            font-size: 64px;
            color: #0ff;
            text-shadow: 0 0 30px #0ff, 0 0 60px #08f, 0 0 90px #04a;
            letter-spacing: 12px;
            margin-bottom: 10px;
        }
        #mainMenu .tagline {
            font-size: 14px;
            color: #088;
            letter-spacing: 6px;
            margin-bottom: 60px;
        }
        .menuBtn {
            display: block;
            width: 280px;
            padding: 14px;
            margin: 8px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .menuBtn:hover {
            background: rgba(0,255,255,0.15);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            transform: scale(1.05);
        }
        .menuBtn:active { transform: scale(0.98); }
        /* Death screen */
        #deathScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(20,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 600;
        }
        #deathScreen h1 {
            font-size: 56px;
            color: #f44;
            text-shadow: 0 0 30px #f00;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        #deathStats {
            color: #a66;
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 2;
        }
        /* Pause overlay */
        #pauseOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 400;
        }
        #pauseOverlay h1 {
            font-size: 48px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer"></div>

    <div id="loadingScreen">
        <h1>VOID FRONTIER</h1>
        <div class="subtitle">INITIALIZING SYSTEMS</div>
        <div id="loadingBar"><div id="loadingFill"></div></div>
        <div id="loadingText">Loading core systems...</div>
    </div>

    <div id="mainMenu">
        <h1>VOID FRONTIER</h1>
        <div class="tagline">EXPLORE THE UNKNOWN</div>
        <button class="menuBtn" id="btnNewGame">New Voyage</button>
        <button class="menuBtn" id="btnContinue">Continue</button>
        <button class="menuBtn" id="btnSettings">Settings</button>
        <button class="menuBtn" id="btnCredits">Credits</button>
    </div>

    <div id="deathScreen">
        <h1>SHIP DESTROYED</h1>
        <div id="deathStats"></div>
        <button class="menuBtn" id="btnRespawn">Respawn at Station</button>
        <button class="menuBtn" id="btnDeathMenu">Main Menu</button>
    </div>

    <div id="pauseOverlay">
        <h1>PAUSED</h1>
        <button class="menuBtn" id="btnResume" style="margin-top:40px">Resume</button>
        <button class="menuBtn" id="btnPauseMenu">Main Menu</button>
    </div>

    <!-- Core Engine -->
    <script src="js/utils.js"></script>
    <script src="js/math-utils.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/input.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/camera.js"></script>

    <!-- Game World -->
    <script src="js/starfield.js"></script>
    <script src="js/nebula.js"></script>
    <script src="js/galaxy.js"></script>
    <script src="js/asteroids.js"></script>
    <script src="js/hazards.js"></script>

    <!-- Entities -->
    <script src="js/player.js"></script>
    <script src="js/weapons.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/enemy-ai.js"></script>
    <script src="js/bosses.js"></script>

    <!-- Systems -->
    <script src="js/particles.js"></script>
    <script src="js/loot.js"></script>
    <script src="js/powerups.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/missions.js"></script>
    <script src="js/trading.js"></script>
    <script src="js/diplomacy.js"></script>
    <script src="js/warp.js"></script>
    <script src="js/dialog.js"></script>
    <script src="js/save-system.js"></script>

    <!-- UI -->
    <script src="js/hud.js"></script>
    <script src="js/minimap.js"></script>
    <script src="js/ui-menus.js"></script>

    <!-- Main -->
    <script src="js/game.js"></script>
</body>
</html>
