<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="1" stop-color="#ff5da2" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7ee7ff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#g)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <text x="80" y="900" font-family="Georgia, 'Songti SC', serif" font-size="640"
        font-weight="900" fill="#7ee7ff" fill-opacity="0.07" letter-spacing="-30">A</text>
  <g font-family="Georgia, 'Songti SC', serif" fill="#7ee7ff">
    <text x="80" y="200" font-size="28" letter-spacing="8" fill-opacity="0.6">¶ MARGINALIA · GAMES</text>
    <text x="80" y="540" font-size="156" font-weight="700" letter-spacing="-3">AETHER — A Flight of Light</text>
    <line x1="80" y1="600" x2="280" y2="600" stroke="#ff5da2" stroke-width="6"/>
    <text x="80" y="680" font-size="36" fill-opacity="0.7" font-style="italic">A meditative 3D flight game. Steer a spirit of light, gather golden motes, revive eight sleeping monoliths, and bring back the dawn.</text>
  </g>
</svg>
